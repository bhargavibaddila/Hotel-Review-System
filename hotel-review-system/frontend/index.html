<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayRate — Hotel Review System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #14232f;
    --navy-deep: #0b171f;
    --gold: #c9a24b;
    --cream: #f6f3ec;
    --slate: #5b6b74;
    --line: #dfe3e2;
    --danger: #b3452c;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--cream);color:var(--navy-deep);}
  h1,h2,h3,.brand{font-family:'Fraunces',serif;}
  .header{
    background:var(--navy);
    color:var(--cream);
    padding:22px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{font-size:1.6rem;font-weight:600;letter-spacing:0.5px;color:var(--cream);}
  .brand span{color:var(--gold);}
  .tagline{font-size:0.8rem;color:#9fb0ba;margin-top:2px;}
  .container{max-width:1000px;margin:0 auto;padding:32px 20px 60px;}
  .section-title{
    font-size:1.4rem;font-weight:600;margin:0 0 18px;
    display:flex;align-items:center;gap:10px;
  }
  .section-title::before{
    content:'';width:26px;height:2px;background:var(--gold);display:inline-block;
  }
  #hotel-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-bottom:40px;}
  .hotel-card{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;
    display:flex;flex-direction:column;
  }
  .hotel-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(11,23,31,0.10);}
  .hotel-card img{width:100%;height:150px;object-fit:cover;background:var(--line);}
  .hotel-card .body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column;}
  .hotel-card h3{margin:0 0 4px;font-size:1.05rem;}
  .hotel-card .loc{font-size:0.8rem;color:var(--slate);margin-bottom:8px;}
  .hotel-card .desc{font-size:0.82rem;color:var(--slate);flex:1;margin-bottom:10px;line-height:1.4;}
  .rating-row{display:flex;align-items:center;gap:8px;font-size:0.85rem;}
  .stars{color:var(--gold);letter-spacing:1px;}
  .count{color:var(--slate);font-size:0.78rem;}
  .card-actions{display:flex;justify-content:flex-end;padding:0 16px 12px;}
  .icon-btn{
    background:none;border:none;color:var(--danger);cursor:pointer;font-size:0.75rem;
    opacity:0.7;
  }
  .icon-btn:hover{opacity:1;text-decoration:underline;}

  .panel{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 24px;margin-bottom:32px;
  }
  form label{display:block;font-size:0.8rem;font-weight:600;color:var(--slate);margin:12px 0 4px;}
  form input, form textarea, form select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;
    font-family:inherit;font-size:0.9rem;background:#fdfdfb;
  }
  form textarea{resize:vertical;min-height:70px;}
  .btn{
    margin-top:16px;background:var(--navy);color:var(--cream);border:none;
    padding:11px 22px;border-radius:6px;font-weight:600;cursor:pointer;font-size:0.88rem;
    letter-spacing:0.3px;transition:background .15s;
  }
  .btn:hover{background:var(--navy-deep);}
  .btn.gold{background:var(--gold);color:var(--navy-deep);}
  .btn.gold:hover{background:#b6913f;}

  #detail-view{display:none;}
  .back-link{
    background:none;border:none;color:var(--navy);font-weight:600;cursor:pointer;
    font-size:0.85rem;margin-bottom:14px;padding:0;
  }
  .detail-header{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
  .detail-header img{width:220px;height:150px;object-fit:cover;border-radius:var(--radius);background:var(--line);}
  .detail-info h2{margin:0 0 6px;}
  .detail-info .loc{color:var(--slate);margin-bottom:10px;}
  .detail-info .desc{font-size:0.92rem;line-height:1.5;color:#333;max-width:520px;}
  .big-rating{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .big-rating .num{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:600;}

  .review-item{border-bottom:1px solid var(--line);padding:16px 0;}
  .review-item:last-child{border-bottom:none;}
  .review-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .reviewer{font-weight:600;font-size:0.92rem;}
  .review-date{font-size:0.75rem;color:var(--slate);}
  .review-comment{font-size:0.88rem;color:#333;line-height:1.5;}
  .star-input{display:flex;gap:4px;margin-top:4px;}
  .star-input span{font-size:1.4rem;cursor:pointer;color:var(--line);}
  .star-input span.active{color:var(--gold);}

  .empty-state{text-align:center;padding:40px 20px;color:var(--slate);}
  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--navy-deep);color:#fff;
    padding:12px 18px;border-radius:8px;font-size:0.85rem;opacity:0;transform:translateY(10px);
    transition:all .25s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateY(0);}
  .error-text{color:var(--danger);font-size:0.78rem;margin-top:4px;display:none;}
  @media(max-width:600px){
    .header{padding:16px 20px;}
    .detail-header img{width:100%;height:180px;}
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="brand">Stay<span>Rate</span></div>
    <div class="tagline">Hotel reviews, honestly told</div>
  </div>
</div>

<div class="container">

  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="panel">
      <div class="section-title">Add a hotel</div>
      <form id="hotel-form">
        <label>Hotel name</label>
        <input type="text" id="h-name" placeholder="e.g. The Grand Palace" required>

        <label>Location</label>
        <input type="text" id="h-location" placeholder="e.g. Hyderabad, India" required>

        <label>Description</label>
        <textarea id="h-description" placeholder="Short description of the hotel"></textarea>

        <label>Image URL (optional)</label>
        <input type="text" id="h-image" placeholder="https://...">

        <button type="submit" class="btn">Add hotel</button>
      </form>
    </div>

    <div class="section-title">All hotels</div>
    <div id="hotel-list"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <button class="back-link" onclick="showListView()">&larr; Back to all hotels</button>

    <div class="detail-header">
      <img id="d-image" src="" alt="">
      <div class="detail-info">
        <h2 id="d-name"></h2>
        <div class="loc" id="d-location"></div>
        <div class="desc" id="d-description"></div>
        <div class="big-rating">
          <span class="num" id="d-avg"></span>
          <span class="stars" id="d-stars"></span>
          <span class="count" id="d-count"></span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Write a review</div>
      <form id="review-form">
        <label>Your name</label>
        <input type="text" id="r-name" placeholder="e.g. Ananya Rao" required>

        <label>Rating</label>
        <div class="star-input" id="star-input">
          <span data-val="1">&#9733;</span>
          <span data-val="2">&#9733;</span>
          <span data-val="3">&#9733;</span>
          <span data-val="4">&#9733;</span>
          <span data-val="5">&#9733;</span>
        </div>

        <label>Comment</label>
        <textarea id="r-comment" placeholder="Share your experience..." required></textarea>

        <button type="submit" class="btn gold">Submit review</button>
      </form>
    </div>

    <div class="section-title">Reviews</div>
    <div id="review-list" class="panel"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'http://localhost:8080/api';
let currentHotelId = null;
let selectedRating = 0;

// ---------- Utilities ----------
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function starString(avg) {
  const full = Math.round(avg);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ---------- View switching ----------
function showListView() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  loadHotels();
}

function showDetailView(hotelId) {
  currentHotelId = hotelId;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  loadHotelDetail(hotelId);
}

// ---------- API calls ----------
async function loadHotels() {
  const list = document.getElementById('hotel-list');
  list.innerHTML = '<div class="empty-state">Loading hotels...</div>';
  try {
    const res = await fetch(`${API_BASE}/hotels`);
    const hotels = await res.json();
    if (!hotels.length) {
      list.innerHTML = '<div class="empty-state">No hotels yet. Add the first one above!</div>';
      return;
    }
    list.innerHTML = '';
    hotels.forEach(h => list.appendChild(renderHotelCard(h)));
  } catch (err) {
    list.innerHTML = '<div class="empty-state">Could not reach the backend. Make sure Spring Boot is running on port 8080.</div>';
  }
}

function renderHotelCard(h) {
  const card = document.createElement('div');
  card.className = 'hotel-card';
  const img = h.imageUrl || 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=500';
  card.innerHTML = `
    <img src="${img}" alt="${h.name}" onerror="this.src='https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=500'">
    <div class="body">
      <h3>${h.name}</h3>
      <div class="loc">${h.location}</div>
      <div class="desc">${h.description || ''}</div>
      <div class="rating-row">
        <span class="stars">${starString(h.averageRating)}</span>
        <span class="count">${h.averageRating > 0 ? h.averageRating.toFixed(1) : 'No ratings'} ${h.reviewCount ? '(' + h.reviewCount + ' review' + (h.reviewCount > 1 ? 's' : '') + ')' : ''}</span>
      </div>
    </div>
  `;
  card.addEventListener('click', () => showDetailView(h.id));

  const actions = document.createElement('div');
  actions.className = 'card-actions';
  const delBtn = document.createElement('button');
  delBtn.className = 'icon-btn';
  delBtn.textContent = 'Delete hotel';
  delBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!confirm(`Delete "${h.name}"? This also removes its reviews.`)) return;
    await fetch(`${API_BASE}/hotels/${h.id}`, { method: 'DELETE' });
    showToast('Hotel deleted');
    loadHotels();
  });
  actions.appendChild(delBtn);

  const wrapper = document.createElement('div');
  wrapper.appendChild(card);
  wrapper.appendChild(actions);
  return wrapper;
}

async function loadHotelDetail(hotelId) {
  const res = await fetch(`${API_BASE}/hotels/${hotelId}`);
  const h = await res.json();
  document.getElementById('d-image').src = h.imageUrl || 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=500';
  document.getElementById('d-name').textContent = h.name;
  document.getElementById('d-location').textContent = h.location;
  document.getElementById('d-description').textContent = h.description || '';
  document.getElementById('d-avg').textContent = h.averageRating > 0 ? h.averageRating.toFixed(1) : '—';
  document.getElementById('d-stars').textContent = starString(h.averageRating);
  document.getElementById('d-count').textContent = h.reviewCount ? `${h.reviewCount} review${h.reviewCount > 1 ? 's' : ''}` : 'No reviews yet';

  loadReviews(hotelId);
}

async function loadReviews(hotelId) {
  const container = document.getElementById('review-list');
  container.innerHTML = '<div class="empty-state">Loading reviews...</div>';
  const res = await fetch(`${API_BASE}/hotels/${hotelId}/reviews`);
  const reviews = await res.json();
  if (!reviews.length) {
    container.innerHTML = '<div class="empty-state">No reviews yet. Be the first to write one!</div>';
    return;
  }
  container.innerHTML = '';
  reviews.forEach(r => {
    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `
      <div class="review-top">
        <span class="reviewer">${r.reviewerName} <span class="stars">${starString(r.rating)}</span></span>
        <span class="review-date">${formatDate(r.createdAt)}</span>
      </div>
      <div class="review-comment">${r.comment}</div>
    `;
    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn';
    delBtn.textContent = 'Delete';
    delBtn.style.marginTop = '6px';
    delBtn.addEventListener('click', async () => {
      await fetch(`${API_BASE}/reviews/${r.id}`, { method: 'DELETE' });
      showToast('Review deleted');
      loadHotelDetail(currentHotelId);
    });
    item.appendChild(delBtn);
    container.appendChild(item);
  });
}

// ---------- Form handlers ----------
document.getElementById('hotel-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {
    name: document.getElementById('h-name').value.trim(),
    location: document.getElementById('h-location').value.trim(),
    description: document.getElementById('h-description').value.trim(),
    imageUrl: document.getElementById('h-image').value.trim()
  };
  try {
    const res = await fetch(`${API_BASE}/hotels`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Failed');
    e.target.reset();
    showToast('Hotel added!');
    loadHotels();
  } catch (err) {
    showToast('Could not add hotel. Check the backend is running.');
  }
});

document.querySelectorAll('#star-input span').forEach(star => {
  star.addEventListener('click', () => {
    selectedRating = parseInt(star.dataset.val);
    document.querySelectorAll('#star-input span').forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.val) <= selectedRating);
    });
  });
});

document.getElementById('review-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!selectedRating) {
    showToast('Please select a star rating');
    return;
  }
  const payload = {
    reviewerName: document.getElementById('r-name').value.trim(),
    rating: selectedRating,
    comment: document.getElementById('r-comment').value.trim()
  };
  try {
    const res = await fetch(`${API_BASE}/hotels/${currentHotelId}/reviews`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Failed');
    e.target.reset();
    selectedRating = 0;
    document.querySelectorAll('#star-input span').forEach(s => s.classList.remove('active'));
    showToast('Review submitted!');
    loadHotelDetail(currentHotelId);
  } catch (err) {
    showToast('Could not submit review.');
  }
});

// ---------- Init ----------
loadHotels();
</script>
</body>
</html>
